name: Test default comparison (exact)
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          expected: foobar
          actual: foobar
      - name: Assert result is passed with default exact comparison
        env:
          ACTUAL: ${{ steps.action.outputs.result }}
        run: |
          echo "actual: $ACTUAL"
          if [ "$ACTUAL" != "passed" ]; then
            echo "FAIL: expected 'passed' but got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"
