name: Test exact match mismatch returns failed
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          expected: hello
          actual: world
          comparison: exact
        continue-on-error: true
      - name: Assert result is failed
        env:
          ACTUAL: ${{ steps.action.outputs.result }}
        run: |
          echo "actual: $ACTUAL"
          if [ "$ACTUAL" != "failed" ]; then
            echo "FAIL: expected 'failed' but got '$ACTUAL'"
            exit 1
          fi
          echo "PASS"
